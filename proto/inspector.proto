syntax = "proto3";

package inspector;

option go_package = "media-inspector/proto/inspectorpb";

// MediaInspector inspects a media file and reports its container,
// duration, and per-stream (video/audio) details.
service MediaInspector {
  // Inspect analyzes the file at the given path and returns its
  // container format, duration, and stream metadata.
  rpc Inspect(InspectRequest) returns (InspectResponse);
}

// InspectRequest specifies which file to inspect.
message InspectRequest {
  // Absolute path to the media file, as seen by the server
  // (e.g. inside the container, this is the mounted path).
  string file_path = 1;
}

// VideoDetails holds fields that only exist for a video stream.
message VideoDetails {
  uint32 width = 1;
  uint32 height = 2;
  string fps = 3;
}

// AudioDetails holds fields that only exist for an audio stream.
message AudioDetails {
  uint32 channels = 1;
  uint32 sample_rate = 2;
}

// Stream describes a single video or audio track found inside a
// media file.
//
// Which kind of stream this is — video or audio — is determined by
// which field of `details` is set, via the oneof itself; there is no
// separate discriminator field, since one would just duplicate what
// the oneof already guarantees.
message Stream {
  string codec = 1;
  uint32 bitrate = 2;

  oneof details {
    VideoDetails video = 3;
    AudioDetails audio = 4;
  }
}

// InspectResponse contains the result of inspecting a media file.
//
// If `error` is non-empty, inspection did not succeed — `container`,
// `duration_seconds`, and `streams` will be unset, and callers should
// display or handle `error` instead.
//
// Note: malformed requests (e.g. an empty file_path) are still
// reported as a gRPC error status, not through this field — `error`
// is specifically for problems with the file itself.
message InspectResponse {
  string container = 1;
  double duration_seconds = 2;
  repeated Stream streams = 3;
  string error = 4;
}