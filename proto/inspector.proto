syntax = "proto3";

package inspector;

option go_package = "media-inspector/proto/inspectorpb";

// MediaInspector inspects one or more media files and reports each
// one's container, duration, and per-stream (video/audio) details.
service MediaInspector {
  // Inspect analyzes every file path given in the request. The
  // server processes all of them concurrently and returns a single
  // response only once every file has finished, with one FileResult
  // per input path, in the same order they were requested.
  rpc Inspect(InspectRequest) returns (InspectResponse);
}

message InspectRequest {
  repeated string file_paths = 1;
}

message VideoDetails {
  uint32 width = 1;
  uint32 height = 2;
  string fps = 3;
}

message AudioDetails {
  uint32 channels = 1;
  uint32 sample_rate = 2;
}

message Stream {
  string codec = 1;
  uint32 bitrate = 2;

  oneof details {
    VideoDetails video = 3;
    AudioDetails audio = 4;
  } 
}
// FileResult holds the outcome of inspecting a single file.
message FileResult {
  string file_path = 1;
  string container = 2;
  double duration_seconds = 3;
  repeated Stream streams = 4;
  string error = 5;
}

message InspectResponse {
  repeated FileResult results = 1;
}